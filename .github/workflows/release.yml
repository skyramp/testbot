name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
      release_name:
        description: 'Release title'
        required: true
      release_body:
        description: 'Release notes'
        required: false
        default: 'Test release'
      dry_run:
        description: 'Dry run — build and clone but skip push and release creation'
        type: boolean
        required: false
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          MINOR_TAG=$(echo "$TAG" | sed -E 's/^(v[0-9]+\.[0-9]+)\..*/\1/')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "minor_tag=$MINOR_TAG" >> "$GITHUB_OUTPUT"

          RELEASE_NAME="${{ github.event.release.name || inputs.release_name || inputs.tag }}"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_BODY="${{ github.event.release.body }}"
          else
            RELEASE_BODY="${{ inputs.release_body }}"
          fi
          echo "release_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: skyramp/testbot
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public-testbot

      - name: Copy artifacts
        run: |
          mkdir -p public-testbot/dist
          cp dist/index.js public-testbot/dist/index.js
          cp action.yml public-testbot/action.yml

      - name: Commit and push to public repo
        if: steps.version.outputs.dry_run == 'false'
        run: |
          cd public-testbot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/index.js action.yml
          if git diff --cached --quiet; then
            echo "No changes to commit — artifacts are identical to the last release"
            exit 0
          fi
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git tag -f "${{ steps.version.outputs.minor_tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"
          git push -f origin "${{ steps.version.outputs.minor_tag }}"

      - name: Create GitHub Release on public repo
        if: steps.version.outputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --repo skyramp/testbot \
            --title "${{ steps.version.outputs.release_name }}" \
            --notes "${{ steps.version.outputs.release_body }}"

      - name: Dry run summary
        if: steps.version.outputs.dry_run == 'true'
        run: |
          echo "::notice::Dry run — skipped push and release creation"
          echo "Tag: ${{ steps.version.outputs.tag }}"
          echo "Minor tag: ${{ steps.version.outputs.minor_tag }}"
          echo "Release name: ${{ steps.version.outputs.release_name }}"
          echo ""
          echo "Artifacts that would be published:"
          ls -la public-testbot/dist/index.js public-testbot/action.yml
          echo ""
          echo "Diff in public repo:"
          cd public-testbot && git diff
