name: 'Skyramp Test Bot'
description: 'Automated test maintenance for Skyramp tests using AI-powered agents'
author: 'Skyramp Inc'

branding:
  icon: 'zap'
  color: 'purple'

inputs:
  # Required inputs
  skyramp_license_file:
    description: 'Skyramp license file content (store in GitHub Secrets)'
    required: true
  cursor_api_key:
    description: 'Cursor API key for AI agent access (store in GitHub Secrets)'
    required: false
  copilot_api_key:
    description: 'Copilot API key for AI agent access. Requires a GitHub PAT with "Copilot Requests" permission.'
    required: false

  # High priority optional inputs
  test_directory:
    description: 'Directory containing Skyramp tests'
    required: false
    default: 'tests'
  test_file_pattern:
    description: 'Pattern for test files to commit (e.g., tests/**/*)'
    required: false
    default: 'tests/**/*'
  service_startup_command:
    description: 'Command to start services before test maintenance'
    required: false
    default: 'docker compose up -d'

  # Medium priority optional inputs
  skyramp_executor_version:
    description: 'Skyramp Executor Docker image version'
    required: false
    default: 'v1.3.3'
  skyramp_mcp_version:
    description: 'Skyramp MCP package version'
    required: false
    default: 'latest'
  node_version:
    description: 'Node.js version to use'
    required: false
    default: 'lts/*'
  skip_service_startup:
    description: 'Skip running service startup command'
    required: false
    default: 'false'
  working_directory:
    description: 'Working directory for the action'
    required: false
    default: '.'
  auto_commit:
    description: 'Automatically commit test changes'
    required: false
    default: 'true'
  commit_message:
    description: 'Commit message for test changes'
    required: false
    default: 'Skyramp Testbot: test maintenance suggestions'
  post_pr_comment:
    description: 'Post summary as PR comment'
    required: false
    default: 'true'
  enable_debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  config_file:
    description: 'Path to Skyramp workspace config file'
    required: false
    default: '.skyramp.yml'

outputs:
  test_summary:
    description: 'Full summary of test maintenance actions'
    value: ${{ steps.read-summary.outputs.summary }}
  tests_modified:
    description: 'Number of tests modified'
    value: ${{ steps.parse-summary.outputs.modified }}
  tests_created:
    description: 'Number of tests created'
    value: ${{ steps.parse-summary.outputs.created }}
  tests_executed:
    description: 'Number of tests executed'
    value: ${{ steps.parse-summary.outputs.executed }}

runs:
  using: "composite"
  steps:
    - name: Validate Inputs and Detect Agent Type
      id: validate-inputs
      shell: bash
      run: |
        echo "::group::Validating inputs"
        mkdir -p ${{ runner.temp }}/skyramp
        VALIDATION_ERRORS=""

        if [ -z "${{ inputs.skyramp_license_file }}" ]; then
          echo "::error::skyramp_license_file is required but not provided"
          VALIDATION_ERRORS="${VALIDATION_ERRORS}- \`skyramp_license_file\` is required but not provided\n"
        fi

        # Detect which API keys are provided
        HAS_CURSOR_KEY=$( [ -n "${{ inputs.cursor_api_key }}" ] && echo "true" || echo "false" )
        HAS_GITHUB_TOKEN=$( [ -n "${{ inputs.copilot_api_key }}" ] && echo "true" || echo "false" )

        # Determine agent_type from provided keys
        if [ "$HAS_CURSOR_KEY" = "true" ] && [ "$HAS_GITHUB_TOKEN" = "true" ]; then
          echo "::error::Both cursor_api_key and copilot_api_key provided. Please provide only one."
          VALIDATION_ERRORS="${VALIDATION_ERRORS}- Both \`cursor_api_key\` and \`copilot_api_key\` provided. Please provide only one.\n"
        elif [ "$HAS_CURSOR_KEY" = "true" ]; then
          AGENT_TYPE="cursor"
          echo "::notice::Using Cursor CLI agent (cursor_api_key provided)"
        elif [ "$HAS_GITHUB_TOKEN" = "true" ]; then
          AGENT_TYPE="copilot"
          echo "::notice::Using GitHub Copilot CLI agent (copilot_api_key provided)"
        else
          echo "::error::Either cursor_api_key or copilot_api_key must be provided"
          VALIDATION_ERRORS="${VALIDATION_ERRORS}- Either \`cursor_api_key\` or \`copilot_api_key\` must be provided\n"
        fi

        if [ -n "$VALIDATION_ERRORS" ]; then
          echo "validation_failed=true" >> $GITHUB_OUTPUT
          ERROR_FILE="${{ runner.temp }}/skyramp/validation-error.txt"
          echo "## :x: Skyramp TestBot - Validation Error" > "$ERROR_FILE"
          echo "" >> "$ERROR_FILE"
          echo "The following required inputs are missing or invalid:" >> "$ERROR_FILE"
          echo "" >> "$ERROR_FILE"
          echo -e "$VALIDATION_ERRORS" >> "$ERROR_FILE"
          echo "" >> "$ERROR_FILE"
          echo "Please ensure these inputs are configured in your workflow file." >> "$ERROR_FILE"
          echo "::endgroup::"
          exit 1
        fi

        # Export agent_type for subsequent steps
        echo "AGENT_TYPE=$AGENT_TYPE" >> $GITHUB_ENV

        echo "validation_failed=false" >> $GITHUB_OUTPUT
        echo "::notice::All required inputs validated successfully"
        echo "::endgroup::"

    - name: Post Validation Error Comment
      if: failure() && steps.validate-inputs.outputs.validation_failed == 'true' && github.event.pull_request.number
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: ${{ runner.temp }}/skyramp/validation-error.txt

    - name: Load Workspace Configuration
      id: load-config
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Loading workspace configuration"

        CONFIG_FILE="${{ inputs.config_file }}"

        # Function to get config value with fallback to input default
        get_config() {
          local key=$1
          local default=$2
          local value=""

          if [ -f "$CONFIG_FILE" ] && command -v yq &> /dev/null; then
            value=$(yq ".$key // \"\"" "$CONFIG_FILE" 2>/dev/null)
          fi

          if [ -n "$value" ] && [ "$value" != "null" ]; then
            echo "$value"
          else
            echo "$default"
          fi
        }

        # Install yq if config file exists
        if [ -f "$CONFIG_FILE" ]; then
          echo "Found $CONFIG_FILE, loading configuration..."
          if ! command -v yq &> /dev/null; then
            echo "Installing yq..."
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
        else
          echo "::notice::No $CONFIG_FILE found, using workflow/default values"
        fi

        # Resolve all configuration values (SKYRAMP.yml takes precedence over inputs)
        TEST_DIRECTORY=$(get_config "test_directory" "${{ inputs.test_directory }}")
        TEST_FILE_PATTERN=$(get_config "test_file_pattern" "${{ inputs.test_file_pattern }}")
        SERVICE_STARTUP_COMMAND=$(get_config "service_startup_command" "${{ inputs.service_startup_command }}")
        SKYRAMP_EXECUTOR_VERSION=$(get_config "skyramp_executor_version" "${{ inputs.skyramp_executor_version }}")
        SKYRAMP_MCP_VERSION=$(get_config "skyramp_mcp_version" "${{ inputs.skyramp_mcp_version }}")
        NODE_VERSION=$(get_config "node_version" "${{ inputs.node_version }}")
        SKIP_SERVICE_STARTUP=$(get_config "skip_service_startup" "${{ inputs.skip_service_startup }}")
        AUTO_COMMIT=$(get_config "auto_commit" "${{ inputs.auto_commit }}")
        COMMIT_MESSAGE=$(get_config "commit_message" "${{ inputs.commit_message }}")
        POST_PR_COMMENT=$(get_config "post_pr_comment" "${{ inputs.post_pr_comment }}")
        ENABLE_DEBUG=$(get_config "enable_debug" "${{ inputs.enable_debug }}")

        # Output all resolved values
        echo "test_directory=$TEST_DIRECTORY" >> $GITHUB_OUTPUT
        echo "test_file_pattern=$TEST_FILE_PATTERN" >> $GITHUB_OUTPUT
        echo "service_startup_command=$SERVICE_STARTUP_COMMAND" >> $GITHUB_OUTPUT
        echo "skyramp_executor_version=$SKYRAMP_EXECUTOR_VERSION" >> $GITHUB_OUTPUT
        echo "skyramp_mcp_version=$SKYRAMP_MCP_VERSION" >> $GITHUB_OUTPUT
        echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
        echo "skip_service_startup=$SKIP_SERVICE_STARTUP" >> $GITHUB_OUTPUT
        echo "auto_commit=$AUTO_COMMIT" >> $GITHUB_OUTPUT
        echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
        echo "post_pr_comment=$POST_PR_COMMENT" >> $GITHUB_OUTPUT
        echo "enable_debug=$ENABLE_DEBUG" >> $GITHUB_OUTPUT

        # Log resolved configuration
        echo "Resolved configuration:"
        echo "  - test_directory: $TEST_DIRECTORY"
        echo "  - test_file_pattern: $TEST_FILE_PATTERN"
        echo "  - service_startup_command: $SERVICE_STARTUP_COMMAND"
        echo "  - skyramp_executor_version: $SKYRAMP_EXECUTOR_VERSION"
        echo "  - skyramp_mcp_version: $SKYRAMP_MCP_VERSION"
        echo "  - node_version: $NODE_VERSION"
        echo "  - skip_service_startup: $SKIP_SERVICE_STARTUP"
        echo "  - auto_commit: $AUTO_COMMIT"
        echo "  - commit_message: $COMMIT_MESSAGE"
        echo "  - post_pr_comment: $POST_PR_COMMENT"
        echo "  - enable_debug: $ENABLE_DEBUG"

        echo "::endgroup::"

    - name: Setup Directories
      shell: bash
      run: |
        echo "::group::Setting up working directories"
        mkdir -p ${{ runner.temp }}/skyramp
        echo "Created temporary directory at ${{ runner.temp }}/skyramp"
        echo "::endgroup::"

    - name: Generate Git Diff
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Generating git diff"

        if [ -z "${{ github.event.pull_request.base.sha }}" ]; then
          echo "::warning::Not running in a pull request context, using HEAD~1 for diff"
          git diff HEAD~1 > ${{ runner.temp }}/skyramp/git_diff
        else
          git diff ${{ github.event.pull_request.base.sha }} > ${{ runner.temp }}/skyramp/git_diff
        fi

        DIFF_SIZE=$(wc -l < ${{ runner.temp }}/skyramp/git_diff)
        echo "Generated diff with $DIFF_SIZE lines"

        if [ "${{ steps.load-config.outputs.enable_debug }}" = "true" ]; then
          echo "::debug::Git diff content:"
          cat ${{ runner.temp }}/skyramp/git_diff
        fi

        echo "::endgroup::"

    - name: Inject Skyramp License
      shell: bash
      env:
        LICENSE_FILE_CONTENT: ${{ inputs.skyramp_license_file }}
      run: |
        echo "::group::Configuring Skyramp license"

        echo "$LICENSE_FILE_CONTENT" > ${{ runner.temp }}/skyramp/skyramp_license.lic
        chmod 600 ${{ runner.temp }}/skyramp/skyramp_license.lic

        if [ ! -s ${{ runner.temp }}/skyramp/skyramp_license.lic ]; then
          echo "::error::License file is empty or could not be created"
          exit 1
        fi

        echo "::notice::License file created successfully"
        echo "::endgroup::"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.load-config.outputs.node_version }}

    - name: Pull Skyramp Executor
      shell: bash
      run: |
        echo "::group::Pulling Skyramp Executor Docker image"

        EXECUTOR_VERSION="${{ steps.load-config.outputs.skyramp_executor_version }}"
        MAX_RETRIES=3
        RETRY_COUNT=0

        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if docker pull skyramp/executor:${EXECUTOR_VERSION} --platform linux/amd64; then
            echo "::notice::Successfully pulled Skyramp Executor"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "::warning::Failed to pull image, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
              sleep 5
            else
              echo "::error::Failed to pull Skyramp Executor after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
        done

        echo "::endgroup::"

    - name: Install Skyramp MCP
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Installing Skyramp MCP"

        MCP_VERSION="${{ steps.load-config.outputs.skyramp_mcp_version }}"
        if [ "$MCP_VERSION" = "latest" ]; then
          npm install @skyramp/mcp
        else
          npm install @skyramp/mcp@${MCP_VERSION}
        fi

        echo "::notice::Skyramp MCP installed successfully"
        echo "::endgroup::"

    - name: Install Cursor CLI
      if: env.AGENT_TYPE == 'cursor'
      shell: bash
      run: |
        echo "::group::Installing Cursor CLI"

        # Check if Cursor CLI is already installed
        if command -v agent &> /dev/null; then
          INSTALLED_VERSION=$(agent --version 2>/dev/null || echo "unknown")
          echo "::notice::Cursor CLI already installed (version: $INSTALLED_VERSION)"
        else
          echo "Installing Cursor CLI..."
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl https://cursor.com/install -fsS | bash; then
              echo "::notice::Cursor CLI installed successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "::warning::Installation failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                sleep 5
              else
                echo "::error::Failed to install Cursor CLI after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
        fi

        # Add to PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH

        echo "::endgroup::"

    - name: Install GitHub Copilot CLI
      if: env.AGENT_TYPE == 'copilot'
      shell: bash
      run: |
        echo "::group::Installing GitHub Copilot CLI"

        # Check if Copilot CLI is already installed
        if command -v copilot &> /dev/null; then
          INSTALLED_VERSION=$(copilot --version 2>/dev/null || echo "unknown")
          echo "::notice::GitHub Copilot CLI already installed (version: $INSTALLED_VERSION)"
        else
          echo "Installing GitHub Copilot CLI via npm..."
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if npm install -g @github/copilot; then
              echo "::notice::GitHub Copilot CLI installed successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "::warning::Installation failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                sleep 5
              else
                echo "::error::Failed to install GitHub Copilot CLI after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
        fi

        # Verify installation
        if command -v copilot &> /dev/null; then
          echo "::notice::GitHub Copilot CLI is available"
        else
          echo "::error::GitHub Copilot CLI installation verification failed"
          exit 1
        fi

        echo "::endgroup::"

    - name: Configure MCP Server for Cursor
      if: env.AGENT_TYPE == 'cursor'
      shell: bash
      run: |
        echo "::group::Configuring MCP server for Cursor"

        MCP_VERSION="${{ steps.load-config.outputs.skyramp_mcp_version }}"

        mkdir -p $HOME/.cursor

        cat << EOF > $HOME/.cursor/mcp.json
        {
          "mcpServers": {
            "skyramp-mcp": {
              "command": "npx",
              "args": ["-y", "@skyramp/mcp@${MCP_VERSION}"],
              "env": {
                "LICENSE_FILE": "${{ runner.temp }}/skyramp/skyramp_license.lic",
                "CI": "true"
              }
            }
          }
        }
        EOF

        if [ "${{ steps.load-config.outputs.enable_debug }}" = "true" ]; then
          echo "::debug::MCP configuration:"
          cat $HOME/.cursor/mcp.json
        fi

        echo "::notice::MCP server configured for Cursor"
        echo "::endgroup::"

    - name: Configure MCP Server for Copilot
      if: env.AGENT_TYPE == 'copilot'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Configuring MCP server for Copilot"

        # Create MCP config in home directory
        mkdir -p $HOME/.copilot

        cat << EOF > $HOME/.copilot/mcp-config.json
        {
          "mcpServers": {
            "skyramp-mcp": {
              "type": "local",
              "command": "npx",
              "args": ["-y", "@skyramp/mcp@${{ inputs.skyramp_mcp_version }}"],
              "tools": ["*"],
              "env": {
                "LICENSE_FILE": "${{ runner.temp }}/skyramp/skyramp_license.lic",
                "CI": "true"
              }
            }
          }
        }
        EOF

        # Also create repository-level config for Copilot to discover
        mkdir -p .copilot

        cat << EOF > .copilot/mcp-config.json
        {
          "mcpServers": {
            "skyramp-mcp": {
              "type": "local",
              "command": "npx",
              "args": ["-y", "@skyramp/mcp@${{ inputs.skyramp_mcp_version }}"],
              "tools": ["*"],
              "env": {
                "LICENSE_FILE": "${{ runner.temp }}/skyramp/skyramp_license.lic",
                "CI": "true"
              }
            }
          }
        }
        EOF

        if [ "${{ inputs.enable_debug }}" = "true" ]; then
          echo "::debug::MCP configuration:"
          cat $HOME/.copilot/mcp-config.json
        fi

        echo "::notice::MCP server configured for Copilot"
        echo "::endgroup::"

    - name: Initialize Cursor Agent
      if: env.AGENT_TYPE == 'cursor'
      shell: bash
      env:
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
      run: |
        echo "::group::Initializing Cursor agent"

        # Enable MCP server
        agent mcp enable skyramp-mcp

        # Wait for initialization
        sleep 10

        # Verify MCP server is running
        if [ "${{ steps.load-config.outputs.enable_debug }}" = "true" ]; then
          echo "::debug::Active MCP servers:"
          agent mcp list || echo "::warning::Could not list MCP servers"
        fi

        echo "::notice::Cursor agent initialized"
        echo "::endgroup::"

    - name: Initialize GitHub Copilot CLI
      if: env.AGENT_TYPE == 'copilot'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.copilot_api_key }}
      run: |
        echo "::group::Initializing GitHub Copilot CLI"

        # Copilot CLI authenticates via GH_TOKEN environment variable

        # Wait for initialization
        sleep 5

        # Verify Copilot CLI is accessible
        if copilot --version &> /dev/null; then
          echo "::notice::GitHub Copilot CLI initialized successfully"
        else
          echo "::warning::Could not verify Copilot CLI version"
        fi

        if [ "${{ inputs.enable_debug }}" = "true" ]; then
          echo "::debug::Copilot CLI version:"
          copilot --version || echo "::warning::Could not get version"
        fi

        echo "::endgroup::"

    - name: Setup Agent Command
      shell: bash
      run: |
        echo "::group::Setting up agent command"

        # Set agent command based on agent_type
        if [ "$AGENT_TYPE" = "cursor" ]; then
          # Cursor CLI: -f enables file operations without prompting
          echo "AGENT_CMD=agent -f -p" >> $GITHUB_ENV
          echo "::notice::Agent command set for Cursor"
        else
          # Copilot CLI: --allow-all-tools (required for non-interactive) --allow-all-paths (for file writes)
          echo "AGENT_CMD=copilot --additional-mcp-config @$HOME/.copilot/mcp-config.json --allow-all-tools --allow-all-paths -p" >> $GITHUB_ENV
          echo "::notice::Agent command set for Copilot"
        fi

        echo "::endgroup::"

    - name: Start Services
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Starting services"

        if [ "${{ steps.load-config.outputs.skip_service_startup }}" = "true" ]; then
          echo "::notice::Skipping service startup (skip_service_startup=true)"
          echo "::endgroup::"
          exit 0
        fi

        SERVICE_CMD="${{ steps.load-config.outputs.service_startup_command }}"
        echo "Running command: $SERVICE_CMD"

        if eval "$SERVICE_CMD"; then
          echo "::notice::Services started successfully"
        else
          echo "::warning::Service startup command failed, but continuing..."
        fi

        # Give services time to initialize
        sleep 5

        echo "::endgroup::"

    - name: Run Test Recommendation
      id: skyramp-test-recommendations
      shell: bash
      env:
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
        GH_TOKEN: ${{ inputs.copilot_api_key }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Running test recommendations"

        PROMPT="<TITLE>$PR_TITLE</TITLE>
        <DESCRIPTION>$PR_BODY</DESCRIPTION>

        Use the MCP tools offered by Skyramp MCP server to analyze the pull request title and description to come up with a business justification
        case for this code change. Based on your analysis of the business case, perform

        1. Get recommendations for new contract, e2e, smoke, load tests that can be generated by Skyramp MCP tools
        2. Use Skyramp MCP to execute the tests and validate the results.
        3. Generate a CONCISE summary to '${{ runner.temp }}/skyramp/recommendation-result.txt' following this format:

        ## 🤖 Skyramp Test Bot Recommendations

        ### 💡 Suggested Test Coverage
        - Brief list of new test types added and for which endpoint.

        ### 🧪 Test Results
        - List each test executed with pass/fail status and brief details

        ### ⚠️ Issues Found
        - List any test failures or bugs discovered (if none, write 'None')

        Keep the summary brief and scannable. Avoid repeating code diff details that are already visible in the PR.

        Use the skyramp-mcp tools available to you for test analysis, generation, and execution."

        if $AGENT_CMD "$PROMPT"; then
          echo "::notice::Test recommendations completed successfully"
        else
          EXIT_CODE=$?
          echo "::error::Test recommendations failed with exit code $EXIT_CODE"
          echo "Check the agent logs for details"
          exit $EXIT_CODE
        fi

        echo "::endgroup::"

    - name: Run Test Maintenance
      id: test-maintenance
      shell: bash
      env:
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
        GH_TOKEN: ${{ inputs.copilot_api_key }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Running test maintenance"

        TEST_DIR="${{ steps.load-config.outputs.test_directory }}"

        # Copy git diff to working directory for consistent access
        cp ${{ runner.temp }}/skyramp/git_diff ./.skyramp_git_diff

        PROMPT="Based on the git diff in .skyramp_git_diff file, perform the following test maintenance tasks:

        1. Check if there are any relevant Skyramp tests in the '${TEST_DIR}' directory that correspond to the code changes.
        2. If there are relevant tests, use Skyramp MCP tools to analyze and modify them to ensure they pass with the new changes.
        3. If there are no tests that can validate the changes, use Skyramp MCP to generate appropriate Skyramp tests for the new or modified code.
        4. Use Skyramp MCP to execute the tests and validate the results.
        5. Generate a CONCISE summary to '${{ runner.temp }}/skyramp/result.txt' following this format:

        ## 🤖 Skyramp Test Bot Summary

        **Tests Modified:** [number] | **Tests Created:** [number] | **Tests Executed:** [number] | **Passed:** [number] | **Failed:** [number]

        ### ✅ Maintenance Summary
        - Brief one-line summary of test changes (details are in the commit)

        ### 🧪 Test Results
        - List each test executed with pass/fail status and brief details

        ### ⚠️ Issues Found
        - List any test failures or bugs discovered (if none, write 'None')

        Keep the summary brief and scannable. Avoid repeating code diff details that are already visible in the PR.

        Use the skyramp-mcp tools available to you for test analysis, generation, and execution."

        if $AGENT_CMD "$PROMPT"; then
          echo "::notice::Test maintenance completed successfully"
        else
          EXIT_CODE=$?
          echo "::error::Test maintenance failed with exit code $EXIT_CODE"
          echo "Check the agent logs for details"
          exit $EXIT_CODE
        fi

        # Clean up temporary file
        rm -f .skyramp_git_diff

        echo "::endgroup::"

    - name: Read Summary
      id: read-summary
      shell: bash
      run: |
        echo "::group::Reading test summary"

        if [ -f "${{ runner.temp }}/skyramp/result.txt" ]; then
          SUMMARY=$(cat ${{ runner.temp }}/skyramp/result.txt)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "${{ steps.load-config.outputs.enable_debug }}" = "true" ]; then
            echo "::debug::Maintenance summary content:"
            echo "$SUMMARY"
          fi
        else
          echo "::warning::No maintenance summary file generated"
          echo "summary=No summary available" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    - name: Parse Summary Metrics
      id: parse-summary
      shell: bash
      run: |
        echo "::group::Parsing summary metrics"

        if [ -f "${{ runner.temp }}/skyramp/result.txt" ]; then
          SUMMARY=$(cat ${{ runner.temp }}/skyramp/result.txt)

          # Parse metrics from summary - use head -1 to ensure single value output
          MODIFIED=$(echo "$SUMMARY" | grep -ioE "modified[^0-9]*[0-9]+" | grep -oE "[0-9]+" | head -1 || echo "0")
          CREATED=$(echo "$SUMMARY" | grep -ioE "created[^0-9]*[0-9]+" | grep -oE "[0-9]+" | head -1 || echo "0")
          EXECUTED=$(echo "$SUMMARY" | grep -ioE "executed[^0-9]*[0-9]+" | grep -oE "[0-9]+" | head -1 || echo "0")

          # Ensure we have valid values (default to 0 if empty)
          MODIFIED=${MODIFIED:-0}
          CREATED=${CREATED:-0}
          EXECUTED=${EXECUTED:-0}

          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT
          echo "executed=$EXECUTED" >> $GITHUB_OUTPUT

          echo "::notice::Metrics - Modified: $MODIFIED, Created: $CREATED, Executed: $EXECUTED"
        else
          echo "modified=0" >> $GITHUB_OUTPUT
          echo "created=0" >> $GITHUB_OUTPUT
          echo "executed=0" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    - name: Combine Summaries
      shell: bash
      run: |
        echo "::group::Combining test summaries"

        COMBINED_FILE="${{ runner.temp }}/skyramp/combined-result.txt"

        # Start with recommendations if available
        if [ -f "${{ runner.temp }}/skyramp/recommendation-result.txt" ]; then
          cat "${{ runner.temp }}/skyramp/recommendation-result.txt" >> "$COMBINED_FILE"
          echo "" >> "$COMBINED_FILE"
          echo "---" >> "$COMBINED_FILE"
          echo "" >> "$COMBINED_FILE"
        fi

        # Append maintenance summary if available
        if [ -f "${{ runner.temp }}/skyramp/result.txt" ]; then
          cat "${{ runner.temp }}/skyramp/result.txt" >> "$COMBINED_FILE"
        fi

        if [ -f "$COMBINED_FILE" ]; then
          echo "::notice::Combined summary created successfully"
          if [ "${{ steps.load-config.outputs.enable_debug }}" = "true" ]; then
            echo "::debug::Combined summary content:"
            cat "$COMBINED_FILE"
          fi
        else
          echo "::warning::No summary files found to combine"
        fi

        echo "::endgroup::"

    - name: Post PR Comment
      if: steps.load-config.outputs.post_pr_comment == 'true' && github.event.pull_request.number
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: ${{ runner.temp }}/skyramp/combined-result.txt

    - name: Auto-commit Changes
      if: steps.load-config.outputs.auto_commit == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: ${{ steps.load-config.outputs.commit_message }}
        file_pattern: ${{ steps.load-config.outputs.test_file_pattern }}
