name: 'Skyramp Test Bot'
description: 'Automated test maintenance for Skyramp tests using AI-powered agents'
author: 'Skyramp Inc'

branding:
  icon: 'zap'
  color: 'purple'

inputs:
  # Required inputs
  skyramp_license_file:
    description: 'Skyramp license file content (store in GitHub Secrets)'
    required: true
  cursor_api_key:
    description: 'Cursor API key for AI agent access (store in GitHub Secrets)'
    required: false
  copilot_api_key:
    description: 'Copilot API key for AI agent access. Requires a GitHub PAT with "Copilot Requests" permission.'
    required: false

  # High priority optional inputs
  test_directory:
    description: 'Directory containing Skyramp tests'
    required: false
    default: 'tests'
  test_file_pattern:
    description: 'Pattern for test files to commit (e.g., tests/**/*)'
    required: false
    default: 'tests/**/*'
  service_startup_command:
    description: 'Command to start services before test maintenance'
    required: false
    default: 'docker compose up -d'
  auth_token_command:
    description: 'Shell command to generate an authentication token. Runs after services start; stdout is captured and set as SKYRAMP_TEST_TOKEN for test execution.'
    required: false
    default: ''

  # Medium priority optional inputs
  skyramp_executor_version:
    description: 'Skyramp Executor Docker image version'
    required: false
    default: 'v1.3.3'
  skyramp_mcp_version:
    description: 'Skyramp MCP package version'
    required: false
    default: 'latest'
  skyramp_mcp_source:
    description: 'Source for Skyramp MCP package: "npm" or "github"'
    required: false
    default: 'npm'
  skyramp_mcp_github_token:
    description: 'GitHub PAT with read access to letsramp/mcp (required when source is "github")'
    required: false
  skyramp_mcp_github_ref:
    description: 'Git ref (branch/tag/commit) for letsramp/mcp (used when source is "github")'
    required: false
    default: 'main'
  node_version:
    description: 'Node.js version to use'
    required: false
    default: 'lts/*'
  skip_service_startup:
    description: 'Skip running service startup command'
    required: false
    default: 'false'
  working_directory:
    description: 'Working directory for the action'
    required: false
    default: '.'
  auto_commit:
    description: 'Automatically commit test changes'
    required: false
    default: 'true'
  commit_message:
    description: 'Commit message for test changes'
    required: false
    default: 'Skyramp Testbot: test maintenance suggestions'
  post_pr_comment:
    description: 'Post summary as PR comment'
    required: false
    default: 'true'
  enable_debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  config_file:
    description: 'Path to Skyramp workspace config file'
    required: false
    default: '.skyramp.yml'
outputs:
  test_summary:
    description: 'Full summary of test maintenance actions'
    value: ${{ steps.read-summary.outputs.summary }}
  tests_modified:
    description: 'Number of tests modified'
    value: ${{ steps.parse-summary.outputs.modified }}
  tests_created:
    description: 'Number of tests created'
    value: ${{ steps.parse-summary.outputs.created }}
  tests_executed:
    description: 'Number of tests executed'
    value: ${{ steps.parse-summary.outputs.executed }}
  skipped_self_trigger:
    description: 'Whether execution was skipped due to detecting own commit'
    value: ${{ steps.self-trigger-check.outputs.skip }}
  commit_sha:
    description: 'SHA of the commit made by test-bot (empty if no commit)'
    value: ${{ steps.auto-commit.outputs.commit_hash }}

runs:
  using: "composite"
  steps:
    - name: Check for Self-Trigger
      id: self-trigger-check
      shell: bash
      run: |
        echo "::group::Checking for self-triggered execution"

        # Try github.event.head_commit first (works for push events)
        COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
        COMMIT_EMAIL="${{ github.event.head_commit.author.email }}"

        # Fallback to git log for pull_request events (head_commit is empty)
        if [ -z "$COMMIT_AUTHOR" ]; then
          # For pull_request events, HEAD is a merge commit created by GitHub,
          # so git log -1 returns the wrong author. Use the actual PR head SHA instead.
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -n "$PR_HEAD_SHA" ]; then
            echo "Using pull_request head SHA: $PR_HEAD_SHA"
            COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' "$PR_HEAD_SHA" 2>/dev/null || echo "")
            COMMIT_EMAIL=$(git log -1 --pretty=format:'%ae' "$PR_HEAD_SHA" 2>/dev/null || echo "")
          else
            echo "head_commit not available, using git log to get commit author"
            COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' 2>/dev/null || echo "")
            COMMIT_EMAIL=$(git log -1 --pretty=format:'%ae' 2>/dev/null || echo "")
          fi
        fi

        # Define bot identity (single source of truth)
        BOT_NAME="Skyramp Test Bot"
        BOT_EMAIL="test-bot@skyramp.dev"
        echo "BOT_NAME=$BOT_NAME" >> $GITHUB_ENV
        echo "BOT_EMAIL=$BOT_EMAIL" >> $GITHUB_ENV

        echo "Commit author: $COMMIT_AUTHOR"
        echo "Commit email: $COMMIT_EMAIL"
        echo "Expected name: $BOT_NAME"
        echo "Expected email: $BOT_EMAIL"

        if [ "$COMMIT_AUTHOR" == "$BOT_NAME" ] && [ "$COMMIT_EMAIL" == "$BOT_EMAIL" ]; then
          echo "::notice::Detected self-triggered execution (commit by $BOT_NAME). Skipping to prevent recursion."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "::notice::Not a self-triggered execution. Proceeding with test maintenance."
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    - name: Validate Inputs and Detect Agent Type
      id: validate-inputs
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "::group::Validating inputs"
        mkdir -p ${{ runner.temp }}/skyramp

        # Helper to post a PR comment on validation failure
        post_validation_error() {
          local error_msg="$1"
          echo "::error::$error_msg"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            printf -v body "## :warning: Skyramp Test Bot - Validation Error\n\n**Error:** %s\n\nPlease check your workflow configuration and ensure all required secrets are set correctly." "$error_msg"
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "$body" || true
          fi
        }

        if [ -z "${{ inputs.skyramp_license_file }}" ]; then
          post_validation_error "skyramp_license_file is required but not provided"
          exit 1
        fi

        # Detect which API keys are provided
        HAS_CURSOR_KEY=$( [ -n "${{ inputs.cursor_api_key }}" ] && echo "true" || echo "false" )
        HAS_GITHUB_TOKEN=$( [ -n "${{ inputs.copilot_api_key }}" ] && echo "true" || echo "false" )

        # Determine agent_type from provided keys
        if [ "$HAS_CURSOR_KEY" == "true" ] && [ "$HAS_GITHUB_TOKEN" == "true" ]; then
          post_validation_error "Both cursor_api_key and copilot_api_key provided. Please provide only one."
          exit 1
        elif [ "$HAS_CURSOR_KEY" == "true" ]; then
          AGENT_TYPE="cursor"
          echo "::notice::Using Cursor CLI agent (cursor_api_key provided)"
        elif [ "$HAS_GITHUB_TOKEN" == "true" ]; then
          AGENT_TYPE="copilot"
          echo "::notice::Using GitHub Copilot CLI agent (copilot_api_key provided)"
        else
          post_validation_error "Either cursor_api_key or copilot_api_key must be provided"
          exit 1
        fi

        # Export agent_type for subsequent steps
        echo "AGENT_TYPE=$AGENT_TYPE" >> $GITHUB_ENV

        echo "::notice::All required inputs validated successfully"
        echo "::endgroup::"

    - name: Load Workspace Configuration
      id: load-config
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Loading workspace configuration"

        CONFIG_FILE="${{ inputs.config_file }}"

        # Function to get config value with fallback to input default
        get_config() {
          local key=$1
          local default=$2
          local value=""

          if [ -f "$CONFIG_FILE" ] && command -v yq &> /dev/null; then
            value=$(yq ".$key // \"\"" "$CONFIG_FILE" 2>/dev/null)
          fi

          if [ -n "$value" ] && [ "$value" != "null" ]; then
            echo "$value"
          else
            echo "$default"
          fi
        }

        # Install yq if config file exists
        if [ -f "$CONFIG_FILE" ]; then
          echo "Found $CONFIG_FILE, loading configuration..."
          if ! command -v yq &> /dev/null; then
            echo "Installing yq..."
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
        else
          echo "::notice::No $CONFIG_FILE found, using workflow/default values"
        fi

        # Resolve all configuration values (SKYRAMP.yml takes precedence over inputs)
        TEST_DIRECTORY=$(get_config "test_directory" "${{ inputs.test_directory }}")
        TEST_FILE_PATTERN=$(get_config "test_file_pattern" "${{ inputs.test_file_pattern }}")
        SERVICE_STARTUP_COMMAND=$(get_config "service_startup_command" "${{ inputs.service_startup_command }}")
        SKYRAMP_EXECUTOR_VERSION=$(get_config "skyramp_executor_version" "${{ inputs.skyramp_executor_version }}")
        SKYRAMP_MCP_VERSION=$(get_config "skyramp_mcp_version" "${{ inputs.skyramp_mcp_version }}")
        SKYRAMP_MCP_SOURCE=$(get_config "skyramp_mcp_source" "${{ inputs.skyramp_mcp_source }}")
        SKYRAMP_MCP_GITHUB_REF=$(get_config "skyramp_mcp_github_ref" "${{ inputs.skyramp_mcp_github_ref }}")
        NODE_VERSION=$(get_config "node_version" "${{ inputs.node_version }}")
        SKIP_SERVICE_STARTUP=$(get_config "skip_service_startup" "${{ inputs.skip_service_startup }}")
        AUTO_COMMIT=$(get_config "auto_commit" "${{ inputs.auto_commit }}")
        COMMIT_MESSAGE=$(get_config "commit_message" "${{ inputs.commit_message }}")
        POST_PR_COMMENT=$(get_config "post_pr_comment" "${{ inputs.post_pr_comment }}")
        ENABLE_DEBUG=$(get_config "enable_debug" "${{ inputs.enable_debug }}")
        AUTH_TOKEN_COMMAND=$(get_config "auth_token_command" "${{ inputs.auth_token_command }}")

        # Output all resolved values
        echo "test_directory=$TEST_DIRECTORY" >> $GITHUB_OUTPUT
        echo "test_file_pattern=$TEST_FILE_PATTERN" >> $GITHUB_OUTPUT
        echo "service_startup_command=$SERVICE_STARTUP_COMMAND" >> $GITHUB_OUTPUT
        echo "skyramp_executor_version=$SKYRAMP_EXECUTOR_VERSION" >> $GITHUB_OUTPUT
        echo "skyramp_mcp_version=$SKYRAMP_MCP_VERSION" >> $GITHUB_OUTPUT
        echo "skyramp_mcp_source=$SKYRAMP_MCP_SOURCE" >> $GITHUB_OUTPUT
        echo "skyramp_mcp_github_ref=$SKYRAMP_MCP_GITHUB_REF" >> $GITHUB_OUTPUT
        echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
        echo "skip_service_startup=$SKIP_SERVICE_STARTUP" >> $GITHUB_OUTPUT
        echo "auto_commit=$AUTO_COMMIT" >> $GITHUB_OUTPUT
        echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
        echo "post_pr_comment=$POST_PR_COMMENT" >> $GITHUB_OUTPUT
        echo "enable_debug=$ENABLE_DEBUG" >> $GITHUB_OUTPUT
        echo "auth_token_command=$AUTH_TOKEN_COMMAND" >> $GITHUB_OUTPUT

        # Log resolved configuration
        echo "Resolved configuration:"
        echo "  - test_directory: $TEST_DIRECTORY"
        echo "  - test_file_pattern: $TEST_FILE_PATTERN"
        echo "  - service_startup_command: $SERVICE_STARTUP_COMMAND"
        echo "  - skyramp_executor_version: $SKYRAMP_EXECUTOR_VERSION"
        echo "  - skyramp_mcp_version: $SKYRAMP_MCP_VERSION"
        echo "  - skyramp_mcp_source: $SKYRAMP_MCP_SOURCE"
        echo "  - skyramp_mcp_github_ref: $SKYRAMP_MCP_GITHUB_REF"
        echo "  - node_version: $NODE_VERSION"
        echo "  - skip_service_startup: $SKIP_SERVICE_STARTUP"
        echo "  - auto_commit: $AUTO_COMMIT"
        echo "  - commit_message: $COMMIT_MESSAGE"
        echo "  - post_pr_comment: $POST_PR_COMMENT"
        echo "  - enable_debug: $ENABLE_DEBUG"
        echo "  - auth_token_command: [REDACTED]"

        echo "::endgroup::"

    - name: Validate MCP Source Config
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "::group::Validating MCP source configuration"

        # Helper to post a PR comment on validation failure
        post_validation_error() {
          local error_msg="$1"
          echo "::error::$error_msg"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            printf -v body "## :warning: Skyramp Test Bot - Validation Error\n\n**Error:** %s\n\nPlease check your workflow configuration and ensure all required secrets are set correctly." "$error_msg"
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "$body" || true
          fi
        }

        # Validate against resolved config values (which may come from .skyramp.yml)
        MCP_SOURCE="${{ steps.load-config.outputs.skyramp_mcp_source }}"
        if [ "$MCP_SOURCE" != "npm" ] && [ "$MCP_SOURCE" != "github" ]; then
          post_validation_error "skyramp_mcp_source must be 'npm' or 'github', got '$MCP_SOURCE'"
          exit 1
        fi

        if [ "$MCP_SOURCE" = "github" ] && [ -z "${{ inputs.skyramp_mcp_github_token }}" ]; then
          post_validation_error "skyramp_mcp_github_token is required when skyramp_mcp_source is 'github'"
          exit 1
        fi

        echo "::notice::MCP source configuration valid (source: $MCP_SOURCE)"
        echo "::endgroup::"

    - name: Setup Directories
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Setting up working directories"
        mkdir -p ${{ runner.temp }}/skyramp
        echo "Created temporary directory at ${{ runner.temp }}/skyramp"
        echo "::endgroup::"

    - name: Generate Git Diff
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Generating git diff"

        if [ -z "${{ github.event.pull_request.base.sha }}" ]; then
          echo "::warning::Not running in a pull request context, using HEAD~1 for diff"
          git diff HEAD~1 > ${{ runner.temp }}/skyramp/git_diff
        else
          git diff ${{ github.event.pull_request.base.sha }} > ${{ runner.temp }}/skyramp/git_diff
        fi

        DIFF_SIZE=$(wc -l < ${{ runner.temp }}/skyramp/git_diff)
        echo "Generated diff with $DIFF_SIZE lines"

        if [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
          echo "::debug::Git diff content:"
          cat ${{ runner.temp }}/skyramp/git_diff
        fi

        echo "::endgroup::"

    - name: Inject Skyramp License
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        LICENSE_FILE_CONTENT: ${{ inputs.skyramp_license_file }}
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "::group::Configuring Skyramp license"

        echo "$LICENSE_FILE_CONTENT" > ${{ runner.temp }}/skyramp/skyramp_license.lic
        chmod 600 ${{ runner.temp }}/skyramp/skyramp_license.lic

        if [ ! -s ${{ runner.temp }}/skyramp/skyramp_license.lic ]; then
          echo "::error::License file is empty or could not be created"
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            printf -v body "## :warning: Skyramp Test Bot - License Error\n\n**Error:** License file is empty or could not be created.\n\nPlease ensure your \`skyramp_license_file\` secret is configured correctly. You can generate a new license file by running \`skyramp get-license-file\`."
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "$body" || true
          fi
          exit 1
        fi

        echo "::notice::License file created successfully"
        echo "::endgroup::"

    - name: Setup Node.js
      if: steps.self-trigger-check.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.load-config.outputs.node_version }}

    - name: Install Skyramp MCP
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        SKYRAMP_MCP_GITHUB_TOKEN: ${{ inputs.skyramp_mcp_github_token }}
      run: |
        echo "::group::Installing Skyramp MCP"

        MCP_VERSION="${{ steps.load-config.outputs.skyramp_mcp_version }}"
        MCP_SOURCE="${{ steps.load-config.outputs.skyramp_mcp_source }}"
        MCP_GITHUB_REF="${{ steps.load-config.outputs.skyramp_mcp_github_ref }}"

        if [ "$MCP_SOURCE" = "github" ]; then
          # Mask the PAT token to prevent log leakage
          echo "::add-mask::${SKYRAMP_MCP_GITHUB_TOKEN}"

          # Clone full source (npm install git+https:// strips files not in package.json "files" field,
          # which excludes tsconfig.json and src/, making the build impossible)
          MCP_PKG_DIR="$(pwd)/node_modules/@skyramp/mcp"
          mkdir -p "$(dirname "$MCP_PKG_DIR")"

          REPO_URL="https://x-access-token:${SKYRAMP_MCP_GITHUB_TOKEN}@github.com/letsramp/mcp.git"

          # Handle branch/tag vs commit SHA
          if echo "${MCP_GITHUB_REF}" | grep -Eq '^[0-9a-fA-F]{7,40}$'; then
            echo "Fetching @skyramp/mcp from github.com/letsramp/mcp at commit ${MCP_GITHUB_REF}"
            git init "$MCP_PKG_DIR"
            git -C "$MCP_PKG_DIR" remote add origin "$REPO_URL"
            git -C "$MCP_PKG_DIR" fetch --depth 1 origin "${MCP_GITHUB_REF}"
            git -C "$MCP_PKG_DIR" checkout FETCH_HEAD
          else
            echo "Cloning @skyramp/mcp from github.com/letsramp/mcp (ref: ${MCP_GITHUB_REF})"
            git clone --depth 1 --branch "${MCP_GITHUB_REF}" "$REPO_URL" "$MCP_PKG_DIR"
          fi

          # Log the exact commit SHA used
          MCP_COMMIT_SHA=$(git -C "$MCP_PKG_DIR" rev-parse HEAD)
          echo "::notice::@skyramp/mcp commit: ${MCP_COMMIT_SHA} (ref: ${MCP_GITHUB_REF})"

          # Remove .git to prevent PAT token persistence in .git/config
          rm -rf "$MCP_PKG_DIR/.git"

          # Install dependencies and build
          echo "Installing dependencies and building..."
          (cd "$MCP_PKG_DIR" && npm install --include=dev && npm run build)

          # Set env vars for downstream MCP config steps
          echo "SKYRAMP_MCP_CMD=node" >> $GITHUB_ENV
          echo "SKYRAMP_MCP_ARGS=${MCP_PKG_DIR}/build/index.js" >> $GITHUB_ENV

          # Expose mcp's dependencies (e.g. @skyramp/skyramp) to the top-level node resolution
          echo "NODE_PATH=${MCP_PKG_DIR}/node_modules" >> $GITHUB_ENV
        else
          # npm source (default)
          if [ "$MCP_VERSION" = "latest" ]; then
            npm install @skyramp/mcp
          else
            npm install @skyramp/mcp@${MCP_VERSION}
          fi

          # Set env vars for downstream MCP config steps
          if [ "$MCP_VERSION" = "latest" ]; then
            echo "SKYRAMP_MCP_CMD=npx" >> $GITHUB_ENV
            echo "SKYRAMP_MCP_ARGS=-y @skyramp/mcp" >> $GITHUB_ENV
          else
            echo "SKYRAMP_MCP_CMD=npx" >> $GITHUB_ENV
            echo "SKYRAMP_MCP_ARGS=-y @skyramp/mcp@${MCP_VERSION}" >> $GITHUB_ENV
          fi
        fi

        echo "::notice::Skyramp MCP installed successfully (source: ${MCP_SOURCE})"
        echo "::endgroup::"

    - name: Validate Skyramp License
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        LICENSE_FILE: ${{ runner.temp }}/skyramp/skyramp_license.lic
        CI: "true"
        GH_TOKEN: ${{ github.token }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Validating Skyramp license"

        VALIDATION_OUTPUT=$(node -e "
          const { SkyrampClient } = require('@skyramp/skyramp');
          const client = new SkyrampClient();
          client.login().then((result) => {
            console.log(result);
          }).catch((err) => {
            console.error(err.message);
            process.exit(1);
          });
        " 2>&1) || {
          echo "::error::License validation failed: $VALIDATION_OUTPUT"

          if [ -n "${{ github.event.pull_request.number }}" ]; then
            printf -v body "## :warning: Skyramp Test Bot - License Validation Failed\n\n**Error:** Skyramp license validation failed.\n\n\`\`\`\n%s\n\`\`\`\n\nYour Skyramp license may be expired or invalid. Please generate a new license file by running \`skyramp get-license-file\` and update the \`skyramp_license_file\` secret in your repository settings." "$VALIDATION_OUTPUT"
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "$body" || true
          fi

          exit 1
        }

        echo "::notice::License validation successful"
        echo "::endgroup::"

    - name: Pull Skyramp Executor
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Pulling Skyramp Executor Docker image"

        EXECUTOR_VERSION="${{ steps.load-config.outputs.skyramp_executor_version }}"
        MAX_RETRIES=3
        RETRY_COUNT=0

        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if docker pull skyramp/executor:${EXECUTOR_VERSION} --platform linux/amd64; then
            echo "::notice::Successfully pulled Skyramp Executor"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "::warning::Failed to pull image, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
              sleep 5
            else
              echo "::error::Failed to pull Skyramp Executor after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
        done

        echo "::endgroup::"

    - name: Install Cursor CLI
      if: env.AGENT_TYPE == 'cursor' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Installing Cursor CLI"

        # Check if Cursor CLI is already installed
        if command -v agent &> /dev/null; then
          INSTALLED_VERSION=$(agent --version 2>/dev/null || echo "unknown")
          echo "::notice::Cursor CLI already installed (version: $INSTALLED_VERSION)"
        else
          echo "Installing Cursor CLI..."
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl https://cursor.com/install -fsS | bash; then
              echo "::notice::Cursor CLI installed successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "::warning::Installation failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                sleep 5
              else
                echo "::error::Failed to install Cursor CLI after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
        fi

        # Add to PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH

        echo "::endgroup::"

    - name: Install GitHub Copilot CLI
      if: env.AGENT_TYPE == 'copilot' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Installing GitHub Copilot CLI"

        # Check if Copilot CLI is already installed
        if command -v copilot &> /dev/null; then
          INSTALLED_VERSION=$(copilot --version 2>/dev/null || echo "unknown")
          echo "::notice::GitHub Copilot CLI already installed (version: $INSTALLED_VERSION)"
        else
          echo "Installing GitHub Copilot CLI via npm..."
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if npm install -g @github/copilot; then
              echo "::notice::GitHub Copilot CLI installed successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "::warning::Installation failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                sleep 5
              else
                echo "::error::Failed to install GitHub Copilot CLI after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
        fi

        # Verify installation
        if command -v copilot &> /dev/null; then
          echo "::notice::GitHub Copilot CLI is available"
        else
          echo "::error::GitHub Copilot CLI installation verification failed"
          exit 1
        fi

        echo "::endgroup::"

    - name: Configure MCP Server for Cursor
      if: env.AGENT_TYPE == 'cursor' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Configuring MCP server for Cursor"

        # Build args array from SKYRAMP_MCP_ARGS env var
        IFS=' ' read -ra ARGS_ARRAY <<< "$SKYRAMP_MCP_ARGS"
        ARGS_JSON=$(printf '%s\n' "${ARGS_ARRAY[@]}" | jq -R . | jq -s .)

        mkdir -p $HOME/.cursor

        jq -n \
          --arg cmd "$SKYRAMP_MCP_CMD" \
          --argjson args "$ARGS_JSON" \
          --arg license "${{ runner.temp }}/skyramp/skyramp_license.lic" \
          '{
            mcpServers: {
              "skyramp-mcp": {
                command: $cmd,
                args: $args,
                env: {
                  LICENSE_FILE: $license,
                  CI: "true",
                  SKYRAMP_FEATURE_TESTBOT: "1"
                }
              }
            }
          }' > $HOME/.cursor/mcp.json

        if [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
          echo "::debug::MCP configuration:"
          cat $HOME/.cursor/mcp.json
        fi

        echo "::notice::MCP server configured for Cursor"
        echo "::endgroup::"

    - name: Configure MCP Server for Copilot
      if: env.AGENT_TYPE == 'copilot' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Configuring MCP server for Copilot"

        # Build args array from SKYRAMP_MCP_ARGS env var
        IFS=' ' read -ra ARGS_ARRAY <<< "$SKYRAMP_MCP_ARGS"
        ARGS_JSON=$(printf '%s\n' "${ARGS_ARRAY[@]}" | jq -R . | jq -s .)

        # Create MCP config in home directory
        mkdir -p $HOME/.copilot

        jq -n \
          --arg cmd "$SKYRAMP_MCP_CMD" \
          --argjson args "$ARGS_JSON" \
          --arg license "${{ runner.temp }}/skyramp/skyramp_license.lic" \
          '{
            mcpServers: {
              "skyramp-mcp": {
                type: "local",
                command: $cmd,
                args: $args,
                tools: ["*"],
                env: {
                  LICENSE_FILE: $license,
                  CI: "true",
                  SKYRAMP_FEATURE_TESTBOT: "1"
                }
              }
            }
          }' > $HOME/.copilot/mcp-config.json

        # Also create repository-level config for Copilot to discover
        mkdir -p .copilot

        cp $HOME/.copilot/mcp-config.json .copilot/mcp-config.json

        if [ "${{ steps.load-config.outputs.enable_debug }}" = "true" ]; then
          echo "::debug::MCP configuration:"
          cat $HOME/.copilot/mcp-config.json
        fi

        echo "::notice::MCP server configured for Copilot"
        echo "::endgroup::"

    - name: Initialize Cursor Agent
      if: env.AGENT_TYPE == 'cursor' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
      run: |
        echo "::group::Initializing Cursor agent"

        # Enable MCP server
        agent mcp enable skyramp-mcp

        # Wait for initialization
        sleep 10

        # Verify MCP server is running
        if [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
          echo "::debug::Active MCP servers:"
          agent mcp list || echo "::warning::Could not list MCP servers"
        fi

        echo "::notice::Cursor agent initialized"
        echo "::endgroup::"

    - name: Initialize GitHub Copilot CLI
      if: env.AGENT_TYPE == 'copilot' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.copilot_api_key }}
      run: |
        echo "::group::Initializing GitHub Copilot CLI"

        # Copilot CLI authenticates via GH_TOKEN environment variable

        # Wait for initialization
        sleep 5

        # Verify Copilot CLI is accessible
        if copilot --version &> /dev/null; then
          echo "::notice::GitHub Copilot CLI initialized successfully"
        else
          echo "::warning::Could not verify Copilot CLI version"
        fi

        if [ "${{ inputs.enable_debug }}" == "true" ]; then
          echo "::debug::Copilot CLI version:"
          copilot --version || echo "::warning::Could not get version"
        fi

        echo "::endgroup::"

    - name: Setup Agent Command
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Setting up agent command"

        # Set agent command based on agent_type
        ENABLE_DEBUG="${{ steps.load-config.outputs.enable_debug }}"
        if [ "$AGENT_TYPE" == "cursor" ]; then
          # Cursor CLI: -f enables file operations without prompting
          CURSOR_CMD="agent -f -p --model auto"
          if [ "$ENABLE_DEBUG" == "true" ]; then
            # --output-format stream-json outputs NDJSON events (reasoning, tool calls, results) for log capture
            CURSOR_CMD="$CURSOR_CMD --output-format stream-json"
          fi
          echo "AGENT_CMD=$CURSOR_CMD" >> $GITHUB_ENV
          echo "::notice::Agent command set for Cursor (debug=$ENABLE_DEBUG)"
        else
          # Copilot CLI: --allow-all-tools (required for non-interactive) --allow-all-paths (for file writes)
          echo "AGENT_CMD=copilot --additional-mcp-config @$HOME/.copilot/mcp-config.json --allow-all-tools --allow-all-paths -p" >> $GITHUB_ENV
          echo "::notice::Agent command set for Copilot"
        fi

        echo "::endgroup::"

    - name: Start Services
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Starting services"

        if [ "${{ steps.load-config.outputs.skip_service_startup }}" == "true" ]; then
          echo "::notice::Skipping service startup (skip_service_startup=true)"
          echo "::endgroup::"
          exit 0
        fi

        SERVICE_CMD="${{ steps.load-config.outputs.service_startup_command }}"
        echo "Running command: $SERVICE_CMD"

        if eval "$SERVICE_CMD"; then
          echo "::notice::Services started successfully"
        else
          echo "::warning::Service startup command failed, but continuing..."
        fi

        # Give services time to initialize
        sleep 5

        echo "::endgroup::"

    - name: Generate Auth Token
      id: generate-auth-token
      if: steps.load-config.outputs.auth_token_command != '' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Generating authentication token"

        AUTH_CMD="${{ steps.load-config.outputs.auth_token_command }}"
        echo "Running auth token command..."

        AUTH_TOKEN=$(bash -c "$AUTH_CMD")
        if [ $? -ne 0 ]; then
          echo "::error::Auth token command failed"
          exit 1
        fi

        if [ -z "$AUTH_TOKEN" ]; then
          echo "::warning::Auth token command produced empty output"
        fi

        # Mask token in all subsequent log output
        echo "::add-mask::$AUTH_TOKEN"

        # Set for subsequent steps
        echo "SKYRAMP_TEST_TOKEN=$AUTH_TOKEN" >> $GITHUB_ENV

        echo "::notice::Authentication token generated successfully"
        echo "::endgroup::"

    - name: Run Test Recommendation
      id: skyramp-test-recommendations
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
        GH_TOKEN: ${{ inputs.copilot_api_key }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Running test recommendations"

        PROMPT="<title>$PR_TITLE</title>
        <description>$PR_BODY</description>
        <diff_file>.skyramp_git_diff</diff_file>
        <test_directory>${{ steps.load-config.outputs.test_directory }}</test_directory>
        <recommendation_summary_output_file>${{ runner.temp }}/skyramp/recommendation-result.txt</recommendation_summary_output_file>
        <maintenance_summary_output_file>${{ runner.temp }}/skyramp/result.txt</maintenance_summary_output_file>
        <auth_token>${SKYRAMP_TEST_TOKEN}</auth_token>

        Use the skyramp_testbot prompt and follow the returned instructions.

        AUTHENTICATION:
        When executing any tests using the Skyramp MCP execute tool, use this authentication token: ${SKYRAMP_TEST_TOKEN}
        If the token is empty, pass an empty string for the token parameter."

        AGENT_LOG="${{ runner.temp }}/skyramp/recommendation-agent-log.ndjson"
        if [ "$AGENT_TYPE" == "cursor" ] && [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
          # Debug mode: redirect cursor stream-json output to file (uploaded as artifact)
          mkdir -p "${{ runner.temp }}/skyramp"
          if $AGENT_CMD "$PROMPT" > "$AGENT_LOG" 2>&1; then
            echo "::notice::Test recommendations completed successfully"
          else
            EXIT_CODE=$?
            echo "::error::Test recommendations failed with exit code $EXIT_CODE"
            echo "Agent logs saved to $AGENT_LOG"
            exit $EXIT_CODE
          fi
          # Log the model auto-selected by Cursor
          MODEL=$(grep -m1 -oP '"model"\s*:\s*"\K[^"]+' "$AGENT_LOG" 2>/dev/null || true)
          if [ -n "$MODEL" ]; then
            echo "::notice::Cursor auto-selected model: $MODEL"
          fi
        else
          if $AGENT_CMD "$PROMPT"; then
            echo "::notice::Test recommendations completed successfully"
          else
            EXIT_CODE=$?
            echo "::error::Test recommendations failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        fi

        echo "::endgroup::"

    - name: Run Test Maintenance
      id: test-maintenance
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      env:
        CURSOR_API_KEY: ${{ inputs.cursor_api_key }}
        GH_TOKEN: ${{ inputs.copilot_api_key }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Running test maintenance"

        TEST_DIR="${{ steps.load-config.outputs.test_directory }}"

        # Copy git diff to working directory for consistent access
        cp ${{ runner.temp }}/skyramp/git_diff ./.skyramp_git_diff

        PROMPT="<diff_file>.skyramp_git_diff</diff_file>
        <test_directory>${TEST_DIR}</test_directory>
        <recommendation_summary_output_file>${{ runner.temp }}/skyramp/recommendation-result.txt</recommendation_summary_output_file>
        <maintenance_summary_output_file>${{ runner.temp }}/skyramp/result.txt</maintenance_summary_output_file>
        <auth_token>${SKYRAMP_TEST_TOKEN}</auth_token>

        Use the skyramp_testbot prompt and follow the returned instructions.

        AUTHENTICATION:
        When executing any tests using the Skyramp MCP execute tool, use this authentication token: ${SKYRAMP_TEST_TOKEN}
        If the token is empty, pass an empty string for the token parameter."

        AGENT_LOG="${{ runner.temp }}/skyramp/maintenance-agent-log.ndjson"
        if [ "$AGENT_TYPE" == "cursor" ] && [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
          # Debug mode: redirect cursor stream-json output to file (uploaded as artifact)
          mkdir -p "${{ runner.temp }}/skyramp"
          if $AGENT_CMD "$PROMPT" > "$AGENT_LOG" 2>&1; then
            echo "::notice::Test maintenance completed successfully"
          else
            EXIT_CODE=$?
            echo "::error::Test maintenance failed with exit code $EXIT_CODE"
            echo "Agent logs saved to $AGENT_LOG"
            exit $EXIT_CODE
          fi
          # Log the model auto-selected by Cursor
          MODEL=$(grep -m1 -oP '"model"\s*:\s*"\K[^"]+' "$AGENT_LOG" 2>/dev/null || true)
          if [ -n "$MODEL" ]; then
            echo "::notice::Cursor auto-selected model: $MODEL"
          fi
        else
          if $AGENT_CMD "$PROMPT"; then
            echo "::notice::Test maintenance completed successfully"
          else
            EXIT_CODE=$?
            echo "::error::Test maintenance failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        fi

        # Clean up temporary file
        rm -f .skyramp_git_diff

        echo "::endgroup::"

    - name: Read Summary
      id: read-summary
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Reading test summary"

        if [ -f "${{ runner.temp }}/skyramp/result.txt" ]; then
          SUMMARY=$(cat ${{ runner.temp }}/skyramp/result.txt)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
            echo "::debug::Maintenance summary content:"
            echo "$SUMMARY"
          fi
        else
          echo "::warning::No maintenance summary file generated"
          echo "summary=No summary available" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    - name: Parse Summary Metrics
      id: parse-summary
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Parsing summary metrics"

        if [ -f "${{ runner.temp }}/skyramp/result.txt" ]; then
          SUMMARY=$(cat ${{ runner.temp }}/skyramp/result.txt)

          # Parse metrics from summary - use head -1 to ensure single value output
          MODIFIED=$(echo "$SUMMARY" | grep -ioE "modified[^0-9]*[0-9]+" | grep -oE "[0-9]+" | head -1 || echo "0")
          CREATED=$(echo "$SUMMARY" | grep -ioE "created[^0-9]*[0-9]+" | grep -oE "[0-9]+" | head -1 || echo "0")
          EXECUTED=$(echo "$SUMMARY" | grep -ioE "executed[^0-9]*[0-9]+" | grep -oE "[0-9]+" | head -1 || echo "0")

          # Ensure we have valid values (default to 0 if empty)
          MODIFIED=${MODIFIED:-0}
          CREATED=${CREATED:-0}
          EXECUTED=${EXECUTED:-0}

          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT
          echo "executed=$EXECUTED" >> $GITHUB_OUTPUT

          echo "::notice::Metrics - Modified: $MODIFIED, Created: $CREATED, Executed: $EXECUTED"
        else
          echo "modified=0" >> $GITHUB_OUTPUT
          echo "created=0" >> $GITHUB_OUTPUT
          echo "executed=0" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    - name: Combine Summaries
      if: steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Combining test summaries"

        COMBINED_FILE="${{ runner.temp }}/skyramp/combined-result.txt"

        # Start with recommendations if available
        if [ -f "${{ runner.temp }}/skyramp/recommendation-result.txt" ]; then
          cat "${{ runner.temp }}/skyramp/recommendation-result.txt" >> "$COMBINED_FILE"
          echo "" >> "$COMBINED_FILE"
          echo "---" >> "$COMBINED_FILE"
          echo "" >> "$COMBINED_FILE"
        fi

        # Append maintenance summary if available
        if [ -f "${{ runner.temp }}/skyramp/result.txt" ]; then
          cat "${{ runner.temp }}/skyramp/result.txt" >> "$COMBINED_FILE"
        fi

        if [ -f "$COMBINED_FILE" ]; then
          echo "::notice::Combined summary created successfully"
          if [ "${{ steps.load-config.outputs.enable_debug }}" == "true" ]; then
            echo "::debug::Combined summary content:"
            cat "$COMBINED_FILE"
          fi
        else
          echo "::warning::No summary files found to combine"
        fi

        echo "::endgroup::"

    - name: Upload Agent Logs
      if: always() && steps.load-config.outputs.enable_debug == 'true' && steps.self-trigger-check.outputs.skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: skyramp-agent-logs
        path: |
          ${{ runner.temp }}/skyramp/recommendation-agent-log.ndjson
          ${{ runner.temp }}/skyramp/maintenance-agent-log.ndjson
        if-no-files-found: ignore
        retention-days: 1

    - name: Post PR Comment
      if: steps.load-config.outputs.post_pr_comment == 'true' && github.event.pull_request.number && steps.self-trigger-check.outputs.skip != 'true'
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: ${{ runner.temp }}/skyramp/combined-result.txt

    - name: Configure Git Identity
      if: steps.load-config.outputs.auto_commit == 'true' && steps.self-trigger-check.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::Configuring git identity"
        git config user.name "${{ env.BOT_NAME }}"
        git config user.email "${{ env.BOT_EMAIL }}"
        echo "::notice::Git identity configured as ${{ env.BOT_NAME }} <${{ env.BOT_EMAIL }}>"
        echo "::endgroup::"

    - name: Auto-commit Changes
      id: auto-commit
      if: steps.load-config.outputs.auto_commit == 'true' && steps.self-trigger-check.outputs.skip != 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: ${{ steps.load-config.outputs.commit_message }}
        file_pattern: ${{ steps.load-config.outputs.test_file_pattern }}
        commit_user_name: ${{ env.BOT_NAME }}
        commit_user_email: ${{ env.BOT_EMAIL }}
        commit_author: ${{ env.BOT_NAME }} <${{ env.BOT_EMAIL }}>
