name: Skyramp Test Automation (Monorepo)
on:
  pull_request:
    branches: [main]

jobs:
  # Detect which services have changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      user-service: ${{ steps.filter.outputs.user-service }}
      order-service: ${{ steps.filter.outputs.order-service }}
      payment-service: ${{ steps.filter.outputs.payment-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'services/user-service/**'
            order-service:
              - 'services/order-service/**'
            payment-service:
              - 'services/payment-service/**'

  # Run test maintenance for user service
  user-service-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.user-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Skyramp Testbot for User Service
        uses: skyramp/testbot@v1
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE }}
          cursorApiKey: ${{ secrets.CURSOR_API_KEY }}
          testDirectory: 'services/user-service/tests'
          workingDirectory: 'services/user-service'
          targetSetupCommand: 'docker compose -f services/user-service/docker-compose.yml up -d'
          commitMessage: 'test(user-service): update tests via Skyramp bot'

  # Run test maintenance for order service
  order-service-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.order-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Skyramp Testbot for Order Service
        uses: skyramp/testbot@v1
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE }}
          cursorApiKey: ${{ secrets.CURSOR_API_KEY }}
          testDirectory: 'services/order-service/tests'
          workingDirectory: 'services/order-service'
          targetSetupCommand: 'docker compose -f services/order-service/docker-compose.yml up -d'
          commitMessage: 'test(order-service): update tests via Skyramp bot'

  # Run test maintenance for payment service
  payment-service-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.payment-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Skyramp Testbot for Payment Service
        uses: skyramp/testbot@v1
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE }}
          cursorApiKey: ${{ secrets.CURSOR_API_KEY }}
          testDirectory: 'services/payment-service/tests'
          workingDirectory: 'services/payment-service'
          targetSetupCommand: 'docker compose -f services/payment-service/docker-compose.yml up -d'
          commitMessage: 'test(payment-service): update tests via Skyramp bot'
