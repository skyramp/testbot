name: Advanced Skyramp Test Automation
on:
  pull_request:
    branches: [main]

jobs:
  test-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Skyramp Testbot
        id: skyramp
        uses: skyramp/testbot@v1
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE }}
          cursorApiKey: ${{ secrets.CURSOR_API_KEY }}
          testDirectory: 'api/tests'
          targetSetupCommand: 'npm run start:services'
          skyrampExecutorVersion: 'v1.3.15'
          nodeVersion: '20.x'
          commitMessage: 'chore: update API tests via Skyramp bot [skip ci]'
          enableDebug: false

      - name: Report Results
        run: |
          echo "## Skyramp Testbot Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tests Modified: ${{ steps.skyramp.outputs.tests_modified }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests Created: ${{ steps.skyramp.outputs.tests_created }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests Executed: ${{ steps.skyramp.outputs.tests_executed }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail on no tests
        if: steps.skyramp.outputs.tests_executed == '0'
        run: |
          echo "::error::No tests were executed. This may indicate an issue."
          exit 1
