name: Skyramp Test Automation (Early Access)
on:
  pull_request:
    branches: [main, develop]

jobs:
  test-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git diff

      - name: Run Skyramp Testbot (early access)
        uses: skyramp/testbot@archit/early-access
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE }}
          cursorApiKey: ${{ secrets.CURSOR_API_KEY }}

          # Install @skyramp/mcp from the private GitHub repo
          skyrampMcpSource: github
          skyrampMcpGithubToken: ${{ secrets.SKYRAMP_MCP_GITHUB_TOKEN }}
          skyrampMcpGithubRef: main  # branch, tag, or commit SHA
