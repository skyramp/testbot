name: Skyramp Test Automation with GitHub Copilot

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Skyramp Testbot with GitHub Copilot
        uses: skyramp/testbot@v1
        with:
          # Required inputs
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE }}
          # Requires a PAT with "Copilot Requests" permission
          copilotApiKey: ${{ secrets.COPILOT_PAT }}

          # Test configuration
          testDirectory: tests

          # Service configuration
          targetSetupCommand: docker compose up -d
          skipTargetSetup: false

          # Skyramp configuration
          skyrampExecutorVersion: v1.3.14
          skyrampMcpVersion: latest

          # Workflow behavior
          autoCommit: true
          commitMessage: 'Skyramp Testbot: test maintenance suggestions [Copilot]'
          postPrComment: true

          # Advanced settings
          nodeVersion: lts/*
          workingDirectory: .
          enableDebug: false
