# Example: Trigger Other Workflows on Test-Bot Commits
#
# This example shows how to configure test-bot so its commits trigger
# other GitHub workflows (e.g., CI/CD pipelines, linters, etc.)
#
# Key components:
# 1. Use a PAT (Personal Access Token) at checkout instead of GITHUB_TOKEN
# 2. Add job-level condition to prevent recursive execution
# 3. Configure commit identity for self-trigger detection
#
# Setup instructions:
# 1. Create a fine-grained PAT scoped to this repository with Contents: Read & Write
#    at https://github.com/settings/personal-access-tokens
# 2. Add it as a repository secret named 'PAT_TOKEN'
# 3. Use this workflow configuration

name: Skyramp Test Automation (Triggers Workflows)
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  test-maintenance:
    runs-on: ubuntu-latest
    # IMPORTANT: On push events, skip if triggered by test-bot's own commits (prevents infinite loops)
    # Note: head_commit is only available on push events; pull_request events are handled by the action-level check
    if: github.event_name != 'push' || github.event.head_commit.author.name != 'Skyramp Test Bot'
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Validate PAT_TOKEN is configured - fail early with clear message
      - name: Validate PAT token
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::error::PAT_TOKEN secret is not configured. Commits made with GITHUB_TOKEN won't trigger other workflows."
            echo "::error::Create a fine-grained PAT at https://github.com/settings/personal-access-tokens and add it as a repository secret named 'PAT_TOKEN'"
            exit 1
          fi

      # Use PAT token to enable workflow triggers on commits
      # Commits made with GITHUB_TOKEN don't trigger workflows (GitHub's recursion prevention)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}  # Use PAT instead of default GITHUB_TOKEN

      - name: Run Skyramp Test Bot
        id: skyramp
        uses: skyramp/test-bot@v1
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE }}
          cursor_api_key: ${{ secrets.CURSOR_API_KEY }}

          # Commits are authored as 'Skyramp Test Bot <test-bot@skyramp.dev>'
          # which matches the job-level 'if' condition above

          # Optional: Customize other settings
          # test_directory: 'tests'
          # auto_commit: true
          # post_pr_comment: true

      # Optional: Check if execution was skipped
      - name: Check execution status
        run: |
          if [ "${{ steps.skyramp.outputs.skipped_self_trigger }}" = "true" ]; then
            echo "Execution was skipped (self-triggered commit detected)"
          else
            echo "Test maintenance completed"
            echo "Commit SHA: ${{ steps.skyramp.outputs.commit_sha }}"
          fi
